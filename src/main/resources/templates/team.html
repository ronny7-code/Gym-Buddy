<!doctype html>
<html lang="en" th:replace="~{base :: Layout(~{::section})}">
  <body>
    <section>
      <!-- Breadcrumb Section Begin -->
      <section
        class="breadcrumb-section set-bg"
        data-setbg="img/breadcrumb-bg.jpg"
      >
        <div class="container">
          <div class="row">
            <div class="col-lg-12 text-center">
              <div class="breadcrumb-text">
                <h2>Our Team</h2>
                <div class="bt-option">
                  <a th:href="@{/}">Home</a>
                  <span>Our team</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Team Section Begin -->
      <section class="team-section team-page spad">
        <div class="container">
          <div class="row">
            <div class="col-lg-12">
              <div class="team-title">
                <div class="section-title">
                  <span>Our Team</span>
                  <h2>TRAIN WITH EXPERTS</h2>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-lg-4 col-sm-6" th:each="trainer : ${trainers}">
              <div
                class="ts-item set-bg"
                th:data-setbg="@{'/uploads/images/' + ${trainer.profileImageName}}"
              >
                <div class="ts_text">
                  <h4 th:text="${trainer.name}">Athart Rachel</h4>
                  <span th:text="${trainer.role}">Gym Trainer</span>
                  <div class="trainer-details">
                    <div th:text="'Expert in: ' + ${trainer.expertIn}">
                      Expert in: Weight Training
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </section>
  </body>
</html>
