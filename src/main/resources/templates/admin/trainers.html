<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/adminBase :: Layout(~{::section})}"
>
  <body>
    <section>
      <div class="container-fluid px-4 py-4" style="padding-bottom: 80px">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h4 class="fw-bold mb-1 page-title">
              <i class="fas fa-user-tie me-2" style="color: #6366f1"></i>Trainer
              Directory
            </h4>
            <p class="small mb-0 page-subtitle">
              Manage your gym's professional coaching staff.
            </p>
          </div>
          <a
            th:href="@{/admin/trainer/add}"
            class="btn btn-primary shadow-sm"
            style="background-color: #6366f1; border: none"
          >
            <i class="fas fa-plus me-2"></i>Add New Trainer
          </a>
        </div>

        <div class="table-card card">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table mb-0 align-middle">
                <thead>
                  <tr>
                    <th class="ps-4">Trainer Details</th>
                    <th>Contact Info</th>
                    <th>Expertise</th>
                    <th>Experience</th>
                    <th>Status</th>
                    <th class="text-end pe-4">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="trainer : ${trainers}">
                    <td class="ps-4">
                      <div class="trainer-profile-cell">
                        <div>
                          <div class="fw-bold mb-0" th:text="${trainer.name}">
                            John Doe
                          </div>
                          <div
                            class="small text-muted"
                            th:text="${trainer.role}"
                          >
                            Senior Coach
                          </div>
                        </div>
                      </div>
                    </td>
                    <td>
                      <div class="small">
                        <i class="fas fa-envelope me-1 text-muted"></i>
                        <span th:text="${trainer.email}">email@gym.com</span>
                      </div>
                      <div class="small mt-1">
                        <i class="fas fa-phone me-1 text-muted"></i>
                        <span th:text="${trainer.phoneNumber}">98XXXXXXXX</span>
                      </div>
                    </td>
                    <td>
                      <span
                        class="specialty-badge"
                        th:text="${trainer.expertIn}"
                        >Bodybuilding</span
                      >
                    </td>
                    <td>
                      <span th:text="${trainer.yearsOfExperience}">0</span>
                      Years
                    </td>
                    <td>
                      <span
                        th:if="${trainer.isAvailable}"
                        class="status-available"
                        >Available</span
                      >
                      <span
                        th:unless="${trainer.isAvailable}"
                        class="status-busy"
                        >On Leave</span
                      >
                    </td>
                    <td class="text-end pe-4">
                      <div class="action-btns">
                        <button
                          class="btn btn-light text-muted"
                          title="ID Required"
                        >
                          <i class="fas fa-edit"></i>
                        </button>
                        <button
                          class="btn btn-light text-muted"
                          title="ID Required"
                        >
                          <i class="fas fa-trash"></i>
                        </button>
                      </div>
                    </td>
                  </tr>

                  <tr th:if="${#lists.isEmpty(trainers)}">
                    <td colspan="6" class="text-center py-5">
                      <p class="text-muted mb-0">
                        No trainers found in the records.
                      </p>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
