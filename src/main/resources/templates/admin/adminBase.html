<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="Layout(content)">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Gym Buddy - Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link th:href="@{/admin/css/styles.css}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="sb-nav-fixed">

    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
        <a class="navbar-brand ps-3 fw-bold" th:href="@{/admin/dashboard}">
            <i class="fas fa-dumbbell me-2 text-warning"></i>Gym Buddy
        </a>
        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
        <ul class="navbar-nav ms-auto me-3">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/logout}">
                    <i class="fas fa-sign-out-alt fa-fw me-1"></i>Logout
                </a>
            </li>
        </ul>
    </nav>

    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">MAIN</div>
                        <a class="nav-link" th:href="@{/admin/dashboard}">
                            <div class="sb-nav-link-icon"><i class="fas fa-globe"></i></div>
                            Dashboard
                        </a>

                        <div class="sb-sidenav-menu-heading">GYM MANAGEMENT</div>
                        <a class="nav-link" th:href="@{/admin/members}">
                            <div class="sb-nav-link-icon"><i class="fas fa-users"></i></div> 
                            Members
                        </a>
                        <a class="nav-link" th:href="@{/admin/memberships}">
                            <div class="sb-nav-link-icon"><i class="fas fa-id-card"></i></div> 
                            Memberships
                        </a>

                        <a class="nav-link collapsed" href="#" data-bs-toggle="collapse" data-bs-target="#collapseTrainers" aria-expanded="false" aria-controls="collapseTrainers">
                            <div class="sb-nav-link-icon"><i class="fas fa-person-running"></i></div>
                            Trainers
                            <div class="sb-sidenav-collapse-arrow"><i class="fas fa-angle-down"></i></div>
                        </a>
                        <div class="collapse" id="collapseTrainers" data-bs-parent="#sidenavAccordion">
                            <nav class="sb-sidenav-menu-nested nav">
                                <a class="nav-link" th:href="@{/admin/trainer}">View All Trainers</a>
                                <a class="nav-link" th:href="@{/admin/trainer/add}">Add New Trainer</a>
                            </nav>
                        </div>

                        <a class="nav-link" th:href="@{/admin/payments}">
                            <div class="sb-nav-link-icon"><i class="fas fa-dollar-sign"></i></div> 
                            Payments
                        </a>
                        
                        <div class="sb-sidenav-menu-heading">ACCOUNT</div>
                        <a class="nav-link" th:href="@{/admin/add}">
                            <div class="sb-nav-link-icon"><i class="fas fa-cog"></i></div> 
                            Add New Admin
                        </a>
                    </div>
                </div>
                <div class="sb-sidenav-footer">
                    <div class="small">Logged in as: </div>
                    <span th:text="${adminName}">Admin</span>
                </div>
            </nav>
        </div>

        <div id="layoutSidenav_content">
            <main>
                <div th:replace="${content}"></div>
            </main>

            <footer class="py-4 mt-auto">
                <div class="container-fluid px-4 text-center">
                    <div class="text-muted small">Copyright &copy; Gym Buddy 2025</div>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script th:src="@{/admin/js/scripts.js}"></script>
</body>
</html>
