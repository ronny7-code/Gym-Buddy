<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/adminBase :: Layout(~{::section})}">
<body>
<section>
<style>
  #layoutSidenav_content { background: #f0f4f9 !important; }

  .page-title { color: #1e293b; font-size: 1.3rem; }
  .page-subtitle { color: #64748b; }

  .form-card {
    background: #ffffff;
    border: none;
    border-radius: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
  }

  .section-divider {
    border-color: #e8edf3;
  }

  .form-label {
    color: #374151;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: .3px;
    margin-bottom: 6px;
  }

  .form-control {
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    color: #1e293b;
    font-size: 0.9rem;
    padding: 0.55rem 0.85rem;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .form-control:focus {
    background: #fff;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    color: #1e293b;
    outline: none;
  }
  .form-control::placeholder { color: #b0bac9; }
  .form-control.is-invalid { border-color: #ef4444; }
  .invalid-feedback { color: #ef4444; font-size: 0.78rem; }
  .form-text { color: #94a3b8; font-size: 0.77rem; }

  /* Avatar */
  .avatar-wrap {
    width: 76px; height: 76px; position: relative; flex-shrink: 0;
  }
  .avatar-circle {
    width: 76px; height: 76px; border-radius: 50%;
    background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 100%);
    display: flex; align-items: center; justify-content: center;
    color: #818cf8; font-size: 26px;
    border: 2px solid #e0e7ff;
  }
  .avatar-circle img {
    width: 76px; height: 76px; border-radius: 50%; object-fit: cover;
    display: none; position: absolute; top: 0; left: 0;
  }
  .camera-btn {
    position: absolute; bottom: 1px; right: 1px;
    width: 24px; height: 24px; border-radius: 50%;
    background: #6366f1; border: 2px solid #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .camera-btn i { font-size: 9px; color: #fff; }

  /* Submit button */
  .btn-submit {
    background: linear-gradient(135deg, #6366f1, #818cf8);
    border: none;
    color: #fff;
    border-radius: 10px;
    padding: 0.55rem 1.8rem;
    font-weight: 600;
    font-size: 0.9rem;
    box-shadow: 0 2px 8px rgba(99,102,241,.3);
    transition: opacity .2s, transform .15s;
  }
  .btn-submit:hover { opacity: .92; transform: translateY(-1px); color: #fff; }

  /* Stat badge on header */
  .header-badge {
    background: #ede9fe;
    color: #6366f1;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 12px;
  }
</style>

<div class="container-fluid px-4 py-4" style="padding-bottom: 80px;">

  <!-- Page header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h4 class="fw-bold mb-1 page-title">
        <i class="fas fa-dumbbell me-2" style="color:#6366f1;"></i>Add New Trainer
      </h4>
      <p class="small mb-0 page-subtitle">Register a new trainer to your gym team.</p>
    </div>
    <span class="header-badge"><i class="fas fa-user-tie me-1"></i>Trainer</span>
  </div>

  <!-- Alerts -->
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 border-0 shadow-sm" role="alert">
    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 border-0 shadow-sm" role="alert">
    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <form th:action="@{/admin/trainer/add}" th:object="${trainerDto}" method="post" enctype="multipart/form-data">
    <div class="form-card card">
      <div class="card-body p-4 p-md-5">

        <!-- Photo upload -->
        <div class="d-flex align-items-center gap-3 mb-4 pb-4 border-bottom section-divider">
          <div class="avatar-wrap">
            <div class="avatar-circle" id="avatarCircle">
              <i class="fas fa-user" id="avatarIcon"></i>
              <img id="photoPreview" src="" alt="" />
            </div>
            <label for="profileImageInput" class="camera-btn">
              <i class="fas fa-camera"></i>
            </label>
            <input type="file" id="profileImageInput" name="profileImageFile" accept="image/*" style="display:none;" onchange="previewPhoto(event)" />
          </div>
          <div>
            <div class="fw-semibold mb-1" style="color:#1e293b; font-size:.9rem;">Profile Photo</div>
            <label for="profileImageInput" style="cursor:pointer; color:#6366f1; font-size:.84rem; font-weight:600;">
              <i class="fas fa-upload me-1"></i>Upload image
            </label>
            <div class="form-text mt-1">JPG or PNG · Max 2MB</div>
          </div>
        </div>

        <!-- Row 1 -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   placeholder="Enter Full Name" required />
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="Enter Email" required />
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
          </div>
        </div>

        <!-- Row 2 -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input type="tel" th:field="*{phoneNumber}" class="form-control"
                   th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'"
                   placeholder="Enter Phone Number" maxlength="10" required />
            <div class="invalid-feedback" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Role / Title</label>
            <input type="text" th:field="*{role}" class="form-control"
                   th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'"
                   placeholder="e.g. Head Trainer" required />
            <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
          </div>
        </div>

        <!-- Row 3 -->
        <div class="row g-3 mb-3">
          <div class="col-md-8">
            <label class="form-label">Specializations</label>
            <input type="text" id="expertInRaw" name="expertInRaw" class="form-control"
                   th:classappend="${#fields.hasErrors('expertIn')} ? 'is-invalid'"
                   placeholder="e.g. Weight Training, Yoga, HIIT" required />
            <div class="form-text mt-1">Separate multiple with commas.</div>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('expertIn')}" th:errors="*{expertIn}"></div>
          </div>
          <div class="col-md-4">
            <label class="form-label">Years of Experience</label>
            <input type="number" th:field="*{yearsOfExperience}" class="form-control"
                   th:classappend="${#fields.hasErrors('yearsOfExperience')} ? 'is-invalid'"
                   placeholder="0" min="0" max="50" required />
            <div class="invalid-feedback" th:if="${#fields.hasErrors('yearsOfExperience')}" th:errors="*{yearsOfExperience}"></div>
          </div>
        </div>

        <!-- Bio -->
        <div class="mb-4">
          <label class="form-label">Bio</label>
          <textarea th:field="*{bio}" class="form-control"
                    th:classappend="${#fields.hasErrors('bio')} ? 'is-invalid'"
                    rows="3" placeholder="Short description about the trainer..." maxlength="500" required></textarea>
          <div class="invalid-feedback" th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}"></div>
        </div>

        <!-- Submit -->
        <div class="d-flex justify-content-end pt-2 border-top section-divider">
          <button type="submit" class="btn btn-submit">
            <i class="fas fa-user-plus me-2"></i>Add Trainer
          </button>
        </div>

      </div>
    </div>
  </form>
</div>

<script>
  function previewPhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('photoPreview');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('avatarIcon').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
</script>
</section>
</body>
</html>
