<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/adminBase :: Layout(~{::section})}"
>
  <body>
    <section>
      <div class="container-fluid px-4 py-4" style="padding-bottom: 80px">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h4 class="fw-bold mb-1 page-title">
              <i class="fas fa-users me-2" style="color: #6366f1"></i>Members
              Directory
            </h4>
            <p class="small mb-0 page-subtitle">Manage your gym members.</p>
          </div>
        </div>

        <div class="table-card card">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table mb-0 align-middle">
                <thead>
                  <tr>
                    <th class="ps-4">Member Details</th>
                    <th>Contact Info</th>
                    <th>Age</th>
                    <th>Membership</th>
                    <th class="text-end pe-4">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="member : ${members}">
                    <td class="ps-4">
                      <div class="trainer-profile-cell">
                        <div>
                          <div class="fw-bold mb-0" th:text="${member.name}">
                            Member Name
                          </div>
                          <div
                            class="small text-muted"
                            th:text="'@' + ${member.username}"
                          >
                            @username
                          </div>
                        </div>
                      </div>
                    </td>
                    <td>
                      <div class="small">
                        <i class="fas fa-envelope me-1 text-muted"></i>
                        <span th:text="${member.email}">email@example.com</span>
                      </div>
                      <div class="small mt-1">
                        <i class="fas fa-phone me-1 text-muted"></i>
                        <span th:text="${member.phoneNumber}">9800000000</span>
                      </div>
                    </td>
                    <td>
                      <span th:text="${member.age} + ' yrs'">0 yrs</span>
                    </td>
                    <td>
                      <span
                        class="specialty-badge"
                        th:text="${member.membershipType}"
                        >Monthly</span
                      >
                    </td>
                    <td class="text-end pe-4">
                      <div class="action-btns">
                        <a
                          th:href="@{/admin/member/update/{id}(id=${member.id})}"
                          class="btn btn-light text-muted"
                          title="Edit Member"
                        >
                          <i class="fas fa-edit"></i>
                        </a>
                        <a
                          th:href="@{/admin/member/delete/{id}(id=${member.id})}"
                          class="btn btn-light text-muted"
                          title="Delete Member"
                        >
                          <i class="fas fa-trash"></i>
                        </a>
                      </div>
                    </td>
                  </tr>

                  <tr th:if="${#lists.isEmpty(members)}">
                    <td colspan="5" class="text-center py-5">
                      <p class="text-muted mb-0">
                        No members found in the records.
                      </p>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
