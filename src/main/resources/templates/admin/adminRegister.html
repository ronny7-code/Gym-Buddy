<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/adminBase :: Layout(~{::section})}">
<body>
<section>
<style>
  #layoutSidenav_content { background: #f0f4f9 !important; }

  .page-title { color: #1e293b; font-size: 1.3rem; }
  .page-subtitle { color: #64748b; }

  .form-card {
    background: #ffffff;
    border: none;
    border-radius: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
  }

  .section-divider { border-color: #e8edf3; }

  .form-label {
    color: #374151;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: .3px;
    margin-bottom: 6px;
  }

  .form-control {
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    color: #1e293b;
    font-size: 0.9rem;
    padding: 0.55rem 0.85rem;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .form-control:focus {
    background: #fff;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    color: #1e293b;
    outline: none;
  }
  .form-control::placeholder { color: #b0bac9; }
  .form-control.is-invalid { border-color: #ef4444; }
  .invalid-feedback { color: #ef4444; font-size: 0.78rem; }

  .input-group .form-control { border-radius: 10px 0 0 10px; }
  .input-group .btn-eye {
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-left: none;
    border-radius: 0 10px 10px 0;
    color: #94a3b8;
    padding: 0 14px;
    transition: color .2s;
  }
  .input-group .btn-eye:hover { color: #6366f1; }

  .btn-submit {
    background: linear-gradient(135deg, #6366f1, #818cf8);
    border: none;
    color: #fff;
    border-radius: 10px;
    padding: 0.55rem 1.8rem;
    font-weight: 600;
    font-size: 0.9rem;
    box-shadow: 0 2px 8px rgba(99,102,241,.3);
    transition: opacity .2s, transform .15s;
  }
  .btn-submit:hover { opacity: .92; transform: translateY(-1px); color: #fff; }

  .header-badge {
    background: #ede9fe;
    color: #6366f1;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 12px;
  }
</style>

<div class="container-fluid px-4 py-4" style="padding-bottom: 80px;">

  <!-- Page header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h4 class="fw-bold mb-1 page-title">
        <i class="fas fa-user-shield me-2" style="color:#6366f1;"></i>New Admin Account
      </h4>
      <p class="small mb-0 page-subtitle">Register a new administrator for the panel.</p>
    </div>
    <span class="header-badge"><i class="fas fa-shield-alt me-1"></i>Admin</span>
  </div>

  <!-- Alerts -->
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 border-0 shadow-sm" role="alert">
    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 border-0 shadow-sm" role="alert">
    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <form th:action="@{/admin/register}" th:object="${adminDto}" method="post">
    <div class="form-card card">
      <div class="card-body p-4 p-md-5">

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   placeholder="Enter full name" required />
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="Enter Email" required />
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label class="form-label">Username</label>
            <input type="text" th:field="*{username}" class="form-control"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                   placeholder="Choose a username" required />
            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input type="password" id="password" th:field="*{password}" class="form-control"
                     th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                     placeholder="Create a password" required />
              <button class="btn-eye" type="button" id="togglePassword">
                <i class="fas fa-eye" id="eyeIcon"></i>
              </button>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-end pt-2 border-top section-divider">
          <button type="submit" class="btn btn-submit">
            <i class="fas fa-user-plus me-2"></i>Register Admin
          </button>
        </div>

      </div>
    </div>
  </form>
</div>

<script>
  document.getElementById('togglePassword').addEventListener('click', function () {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      pw.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });
</script>
</section>
</body>
</html>
