<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/adminBase :: Layout(~{::section})}"
>
  <body>
    <section>
      <div class="container-fluid px-4 py-4" style="padding-bottom: 80px">
        <!-- Page header -->
        <div class="d-flex align-items-center justify-content-between mb-4">
          <div>
            <h4 class="fw-bold mb-1 page-title">
              <i class="fas fa-user-shield me-2" style="color: #6366f1"></i>New
              Admin Account
            </h4>
            <p class="small mb-0 page-subtitle">
              Register a new administrator for the panel.
            </p>
          </div>
          <span class="header-badge"
            ><i class="fas fa-shield-alt me-1"></i>Admin</span
          >
        </div>

        <!-- Alerts -->
        <div
          th:if="${success}"
          class="alert alert-success alert-dismissible fade show rounded-3 border-0 shadow-sm"
          role="alert"
        >
          <i class="fas fa-check-circle me-2"></i
          ><span th:text="${success}"></span>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>
        <div
          th:if="${error}"
          class="alert alert-danger alert-dismissible fade show rounded-3 border-0 shadow-sm"
          role="alert"
        >
          <i class="fas fa-exclamation-circle me-2"></i
          ><span th:text="${error}"></span>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>

        <form
          th:action="@{/admin/register}"
          th:object="${adminDto}"
          method="post"
        >
          <div class="form-card card">
            <div class="card-body p-4 p-md-5">
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label">Full Name</label>
                  <input
                    type="text"
                    th:field="*{name}"
                    class="form-control"
                    th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                    placeholder="Enter full name"
                    required
                  />
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('name')}"
                    th:errors="*{name}"
                  ></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email Address</label>
                  <input
                    type="email"
                    th:field="*{email}"
                    class="form-control"
                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                    placeholder="Enter Email"
                    required
                  />
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('email')}"
                    th:errors="*{email}"
                  ></div>
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-12">
                  <label class="form-label">Location</label>
                  <textarea
                    th:field="*{location}"
                    class="form-control"
                    th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'"
                    placeholder="Enter Location Here"
                    rows="3"
                    required
                  ></textarea>
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('location')}"
                    th:errors="*{location}"
                  ></div>
                </div>
              </div>

              <div class="row g-3 mb-4">
                <div class="col-md-6">
                  <label class="form-label">Username</label>
                  <input
                    type="text"
                    th:field="*{username}"
                    class="form-control"
                    th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                    placeholder="Choose a username"
                    required
                  />
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('username')}"
                    th:errors="*{username}"
                  ></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Password</label>
                  <div class="input-group">
                    <input
                      type="password"
                      id="password"
                      th:field="*{password}"
                      class="form-control"
                      th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                      placeholder="Create a password"
                      required
                    />
                    <button class="btn-eye" type="button" id="togglePassword">
                      <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                    <div
                      class="invalid-feedback"
                      th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                    ></div>
                  </div>
                </div>
              </div>

              <div
                class="d-flex justify-content-end pt-2 border-top section-divider"
              >
                <button type="submit" class="btn btn-submit">
                  <i class="fas fa-user-plus me-2"></i>Register Admin
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>

      <script>
        document
          .getElementById("togglePassword")
          .addEventListener("click", function () {
            const pw = document.getElementById("password");
            const icon = document.getElementById("eyeIcon");
            if (pw.type === "password") {
              pw.type = "text";
              icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
              pw.type = "password";
              icon.classList.replace("fa-eye-slash", "fa-eye");
            }
          });
      </script>
    </section>
  </body>
</html>
